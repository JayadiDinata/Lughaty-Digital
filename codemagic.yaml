workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m2

    environment:
      vars:
        NODE_VERSION: "18"

      # ⚠️ WAJIB: Buat environment group "app_store_credentials" di Codemagic UI
      # (Settings > Environment variables > Add group)
      # Isi dengan:
      #   - APP_STORE_CONNECT_ISSUER_ID
      #   - APP_STORE_CONNECT_KEY_ID
      #   - APP_STORE_CONNECT_PRIVATE_KEY
      #   - CERTIFICATE_PRIVATE_KEY_PASSWORD
      #
      # Tanpa Apple Developer Account ($99/thn), build hanya menghasilkan .app
      # yang tidak bisa diinstall di iPhone.

    cache:
      cache_paths:
        - ~/.npm
        - node_modules
        - ios/App/Pods

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build Angular web
        script: npx ng build --configuration=production

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods
        script: cd ios/App && pod install

      - name: Archive IPA
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            -allowProvisioningUpdates \
            archive

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            -exportOptionsPlist $CM_BUILD_DIR/codemagic/export-options.plist \
            -exportPath $CM_BUILD_DIR/build/ipa \
            -allowProvisioningUpdates

    artifacts:
      - build/ipa/*.ipa
      - build/*.xcarchive

    publishing:
      email:
        recipients:
          - email@example.com
        notify:
          success: true
          failure: true
