<ion-header class="app-header">
  <ion-toolbar class="bg-white dark:bg-gray-800 border-b border-slate-200 dark:border-gray-700">
    <ion-buttons slot="start">
      <div routerLink="/tabs/home" routerDirection="root"
        class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-gray-700 text-slate-500 dark:text-gray-400 transition-all">
        <ion-icon name="home-outline" class="text-xl"></ion-icon>
      </div>
    </ion-buttons>
    <ion-title class="text-gold-500 dark:text-green-400 font-bold text-lg">Al-Kitabah</ion-title>
    <ion-buttons slot="end">
      <div (click)="toggleDarkMode()"
        class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-gray-700 text-slate-500 dark:text-gray-400 transition-all">
        <ion-icon [name]="darkModeIcon" class="text-xl"></ion-icon>
      </div>
      <div routerLink="/login" routerDirection="root"
        class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-gray-700 text-slate-500 dark:text-gray-400 transition-all">
        <ion-icon name="log-out-outline" class="text-xl"></ion-icon>
      </div>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="[--background:#f8fafc] dark:[--background:#0f172a]">
  <!-- Progress Indicator -->
  <div class="px-4 pt-2">
    <div class="flex items-center gap-2">
      <div class="flex-1 h-1.5 bg-slate-200 dark:bg-gray-700 rounded-full overflow-hidden">
        <div class="h-full bg-gradient-to-r from-amber-400 to-orange-500 dark:from-amber-500 dark:to-orange-400 rounded-full transition-all duration-500" [style.width.%]="skillProgress"></div>
      </div>
      <span class="text-xs font-semibold text-slate-500 dark:text-gray-400">{{ skillProgress }}%</span>
    </div>
  </div>

  <div class="px-4 py-5 pb-8 flex flex-col items-center gap-4 max-w-[500px] mx-auto animate-fade-in-up">

    <div class="w-full max-w-[500px] bg-white dark:bg-gray-800 rounded-2xl px-3 py-4 shadow-sm dark:shadow-md animate-scale-in">
      <div class="flex items-center justify-between gap-1">
        <button (click)="prevWord()" [disabled]="!hasPrev"
          class="shrink-0 p-1 text-2xl text-gold-500 dark:text-green-400 disabled:opacity-30 transition-all">
          <ion-icon name="chevron-back-outline" class="text-2xl"></ion-icon>
        </button>
        <div class="flex flex-col items-center gap-0.5 flex-1">
          <span class="text-2xl font-bold text-slate-900 dark:text-gray-100 direction-rtl font-arabic leading-tight">{{ currentWord }}</span>
          <span class="text-xs font-bold text-slate-400 dark:text-gray-500">{{ currentIndex + 1 }}/{{ words.length }}</span>
        </div>
        <button (click)="nextWord()" [disabled]="!hasNext"
          class="shrink-0 p-1 text-2xl text-gold-500 dark:text-green-400 disabled:opacity-30 transition-all">
          <ion-icon name="chevron-forward-outline" class="text-2xl"></ion-icon>
        </button>
      </div>
      <div class="flex items-center justify-center gap-1 mt-1">
        <button (click)="playWord()" class="shrink-0 p-1 text-xl text-gold-500 dark:text-green-400">
          <ion-icon name="volume-high-outline" class="text-xl"></ion-icon>
        </button>
        <span class="text-xs font-semibold text-slate-400 dark:text-gray-500">Dengarkan</span>
      </div>
    </div>

    <div class="w-full max-w-[500px] bg-white dark:bg-gray-800 rounded-2xl p-1 shadow-sm dark:shadow-md overflow-hidden animate-fade-in-up" style="animation-delay: 100ms">
      <canvas #drawCanvas
        (mousedown)="startDrawing($event)"
        (mousemove)="draw($event)"
        (mouseup)="stopDrawing()"
        (mouseleave)="stopDrawing()"
        (touchstart)="onTouchStart($event)"
        (touchmove)="onTouchMove($event)"
        (touchend)="onTouchEnd($event)"
        class="block w-full h-[380px] rounded-2xl bg-white dark:bg-gray-900 cursor-crosshair touch-none">
      </canvas>
    </div>

    <div class="flex gap-2 w-full max-w-[500px] animate-fade-in-up" style="animation-delay: 150ms">
      <button (click)="setMode('draw')"
        class="flex-1 h-11 text-xs font-semibold rounded-xl border-2 transition-all"
        [class.bg-gold-500]="mode === 'draw'"
        [class.text-white]="mode === 'draw'"
        [class.border-gold-500]="mode === 'draw'"
        [class.text-gold-500]="mode !== 'draw'"
        [class.border-gold-500]="mode !== 'draw'"
        [class.bg-transparent]="mode !== 'draw'"
        [class.dark:text-green-400]="mode !== 'draw'"
        [class.dark:border-green-500]="mode !== 'draw'">
        <ion-icon name="pencil-outline" class="mr-1 text-lg"></ion-icon>
        Gambar
      </button>
      <button (click)="setMode('erase')"
        class="flex-1 h-11 text-xs font-semibold rounded-xl border-2 transition-all"
        [class.bg-amber-500]="mode === 'erase'"
        [class.text-white]="mode === 'erase'"
        [class.border-amber-500]="mode === 'erase'"
        [class.text-amber-500]="mode !== 'erase'"
        [class.border-amber-500]="mode !== 'erase'"
        [class.bg-transparent]="mode !== 'erase'"
        [class.dark:bg-green-700]="mode === 'erase'"
        [class.dark:text-green-400]="mode !== 'erase'"
        [class.dark:border-green-500]="mode !== 'erase'">
        <ion-icon name="erase-outline" class="mr-1 text-lg"></ion-icon>
        Hapus
      </button>
      <button (click)="resetCanvas()"
        class="flex-1 h-11 text-xs font-semibold rounded-xl border-2 border-red-500 text-red-500 bg-transparent hover:bg-red-50 dark:hover:bg-red-900/20 transition-all">
        <ion-icon name="refresh-outline" class="mr-1 text-lg"></ion-icon>
        Reset
      </button>
    </div>

    <div class="w-full max-w-[500px] bg-white dark:bg-gray-800 rounded-2xl p-4 shadow-sm dark:shadow-md text-center animate-bounce-in" *ngIf="score !== null">
      <div class="text-[11px] font-bold text-slate-500 dark:text-gray-400 uppercase tracking-widest mb-1">Nilai Kemiripan</div>
      <div class="text-4xl font-extrabold"
        [class.text-green-500]="score >= 70"
        [class.text-amber-500]="score >= 40 && score < 70"
        [class.dark:text-green-400]="score >= 40 && score < 70"
        [class.text-red-500]="score < 40">
        {{ score }}%
      </div>
    </div>

  </div>
</ion-content>
