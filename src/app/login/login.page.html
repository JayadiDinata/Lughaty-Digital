<ion-content class="[--background:#f8fafc] dark:[--background:#0f172a]">
  <button (click)="toggleDarkMode()"
    class="fixed top-4 right-4 z-20 w-10 h-10 rounded-full bg-white dark:bg-gray-800 text-gold-500 dark:text-green-400 shadow-md flex items-center justify-center hover:scale-110 transition-all">
    <ion-icon [name]="darkModeIcon" class="text-xl"></ion-icon>
  </button>

  <div class="max-w-md mx-auto px-5 py-8 md:py-16">
    <!-- Logo -->
    <div class="text-center mb-6 animate-bounce-in">
      <img src="assets/img/logo_uika.png" alt="UIKA Bogor" class="w-44 h-auto mx-auto mb-4 object-contain" />
    </div>

    <!-- Title -->
    <div class="text-center mb-8 animate-fade-in-down" style="animation-delay: 150ms">
      <h1 class="text-3xl font-extrabold text-gold-500 dark:text-green-400 tracking-tight mb-1">Lughaty Digital</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400">Media Komunikasi Dakwah Digital</p>
    </div>

    <!-- Form Card -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl px-6 py-8 shadow-sm dark:shadow-md animate-fade-in-up" style="animation-delay: 300ms">
      <!-- Tab header -->
      <div class="flex bg-slate-100 dark:bg-gray-700 rounded-xl p-1 mb-7 animate-fade-in-up" style="animation-delay: 400ms">
        <button (click)="isLogin = true"
          class="flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all"
          [class.bg-white]="isLogin" [class.shadow-sm]="isLogin"
          [class.text-gold-500]="isLogin" [class.text-slate-400]="!isLogin"
          [class.dark:bg-gray-800]="isLogin" [class.dark:text-green-400]="isLogin"
          [class.dark:text-gray-400]="!isLogin">
          Masuk
        </button>
        <button (click)="isLogin = false"
          class="flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all"
          [class.bg-white]="!isLogin" [class.shadow-sm]="!isLogin"
          [class.text-gold-500]="!isLogin" [class.text-slate-400]="isLogin"
          [class.dark:bg-gray-800]="!isLogin" [class.dark:text-green-400]="!isLogin"
          [class.dark:text-gray-400]="isLogin">
          Daftar
        </button>
      </div>

      <!-- Saved Accounts (MUI Card style) -->
      <div *ngIf="isLogin && savedAccounts.length > 0 && !showForm" class="mb-2 space-y-2 animate-fade-in-up" style="animation-delay: 450ms">
        <p class="text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-gray-500 px-1 mb-3">Akun tersimpan</p>
        <div class="space-y-2">
          <div *ngFor="let acc of savedAccounts" (click)="selectAccount(acc)"
            [className]="accountCardClasses(acc)">
            <div class="w-10 h-10 rounded-full bg-gold-500 dark:bg-green-600 flex items-center justify-center text-white text-sm font-bold shrink-0 shadow-sm">
              {{ acc.username.charAt(0).toUpperCase() }}
            </div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-slate-800 dark:text-gray-100 truncate">{{ acc.username }}</div>
              <div class="text-xs text-slate-400 dark:text-gray-500 truncate">{{ acc.email }}</div>
            </div>
            <span (click)="removeSaved(acc.email, $event)"
              class="shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all cursor-pointer">
              <ion-icon name="close-outline" class="text-lg"></ion-icon>
            </span>
          </div>
        </div>
        <div (click)="selectOtherAccount()"
          class="MuiCard-root mt-3 w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-sm font-medium text-slate-500 dark:text-gray-400 border border-dashed border-slate-300 dark:border-gray-600 bg-transparent hover:bg-slate-50 dark:hover:bg-gray-700/50 transition-all cursor-pointer">
          <ion-icon name="person-add-outline" class="text-lg"></ion-icon>
          <span>Gunakan akun lain</span>
        </div>
      </div>

      <!-- Login Form (hidden when saved accounts shown) -->
      <form *ngIf="isLogin && showForm" (ngSubmit)="login()" class="space-y-4">
        <!-- Email - hidden when account selected (pre-filled) -->
        <div *ngIf="!showPasswordOnly" class="animate-fade-in-up" style="animation-delay: 500ms">
          <label class="block mb-2 text-sm font-medium text-slate-700 dark:text-gray-300">Email</label>
          <input #emailInput type="email" [(ngModel)]="email" name="email" required id="emailInput"
            class="MuiInput-root bg-slate-50 dark:bg-gray-900 border border-slate-300 dark:border-gray-600 text-slate-900 dark:text-gray-100 text-sm rounded-xl focus:ring-2 focus:ring-gold-500 dark:focus:ring-green-500 focus:border-transparent block w-full px-4 py-3 placeholder-slate-400 dark:placeholder-gray-500 transition-all" />
        </div>

        <!-- Password - always visible -->
        <div class="relative animate-fade-in-up" style="animation-delay: 600ms">
          <label class="block mb-2 text-sm font-medium text-slate-700 dark:text-gray-300">
            {{ showPasswordOnly ? 'Masukkan password untuk ' + selectedAccount?.username : 'Password' }}
          </label>
          <input #passwordInput id="passwordInput" [(ngModel)]="password" name="password" [type]="showPassword ? 'text' : 'password'" required
            class="MuiInput-root bg-slate-50 dark:bg-gray-900 border border-slate-300 dark:border-gray-600 text-slate-900 dark:text-gray-100 text-sm rounded-xl focus:ring-2 focus:ring-gold-500 dark:focus:ring-green-500 focus:border-transparent block w-full px-4 py-3 pr-12 placeholder-slate-400 dark:placeholder-gray-500 transition-all" />
          <button type="button" (click)="showPassword = !showPassword"
            class="absolute right-3 top-[38px] text-slate-400 dark:text-gray-400 hover:text-slate-600 dark:hover:text-gray-300">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" class="text-xl"></ion-icon>
          </button>
        </div>

        <!-- Back to accounts link (when account was selected) -->
        <div *ngIf="showPasswordOnly" class="text-center -mt-2 animate-fade-in-up" style="animation-delay: 650ms">
          <button type="button" (click)="showForm = false; showPasswordOnly = false; selectedAccount = null; email = ''; password = ''"
            class="text-xs font-medium text-gold-500 dark:text-green-400 hover:underline transition-all">
            Ganti akun
          </button>
        </div>

        <div class="flex items-center gap-2 animate-fade-in-up" style="animation-delay: 650ms">
          <input type="checkbox" id="rememberMe" [(ngModel)]="rememberMe" name="rememberMe"
            class="w-4 h-4 rounded border-slate-300 dark:border-gray-600 text-gold-500 dark:text-green-500 focus:ring-gold-500 dark:focus:ring-green-500 bg-slate-50 dark:bg-gray-900 cursor-pointer" />
          <label for="rememberMe" class="text-sm text-slate-600 dark:text-gray-300 cursor-pointer select-none">Ingat Saya</label>
        </div>

        <div class="animate-fade-in-up" style="animation-delay: 700ms">
          <button type="submit" [disabled]="loading"
            class="MuiButton-root w-full text-white bg-gold-500 hover:bg-gold-600 focus:ring-4 focus:ring-gold-300 dark:bg-green-700 dark:hover:bg-green-800 dark:focus:ring-green-800 font-bold rounded-xl text-base px-5 py-3.5 text-center transition-all disabled:opacity-60 active:scale-[0.97] hover:shadow-lg">
            Masuk
          </button>
        </div>

        <div class="animate-fade-in-up" style="animation-delay: 800ms">
          <button type="button" (click)="clr()"
            class="w-full text-slate-600 dark:text-gray-300 bg-slate-100 dark:bg-gray-700 hover:bg-slate-200 dark:hover:bg-gray-600 focus:ring-4 focus:ring-slate-200 dark:focus:ring-gray-600 font-semibold rounded-xl text-base px-5 py-3.5 text-center transition-all active:scale-[0.97]">
            Batal
          </button>
        </div>
      </form>

      <!-- Register Form -->
      <form *ngIf="!isLogin" (ngSubmit)="addData()" class="space-y-4">
        <div class="animate-fade-in-up" style="animation-delay: 500ms">
          <label class="block mb-2 text-sm font-medium text-slate-700 dark:text-gray-300">Username</label>
          <input type="text" [(ngModel)]="username" name="username" required
            class="MuiInput-root bg-slate-50 dark:bg-gray-900 border border-slate-300 dark:border-gray-600 text-slate-900 dark:text-gray-100 text-sm rounded-xl focus:ring-2 focus:ring-gold-500 dark:focus:ring-green-500 focus:border-transparent block w-full px-4 py-3 placeholder-slate-400 dark:placeholder-gray-500 transition-all" />
        </div>

        <div class="animate-fade-in-up" style="animation-delay: 600ms">
          <label class="block mb-2 text-sm font-medium text-slate-700 dark:text-gray-300">Email</label>
          <input type="email" [(ngModel)]="regEmail" name="regEmail" required
            class="MuiInput-root bg-slate-50 dark:bg-gray-900 border border-slate-300 dark:border-gray-600 text-slate-900 dark:text-gray-100 text-sm rounded-xl focus:ring-2 focus:ring-gold-500 dark:focus:ring-green-500 focus:border-transparent block w-full px-4 py-3 placeholder-slate-400 dark:placeholder-gray-500 transition-all" />
        </div>

        <div class="relative animate-fade-in-up" style="animation-delay: 700ms">
          <label class="block mb-2 text-sm font-medium text-slate-700 dark:text-gray-300">Password</label>
          <input [type]="showPass1 ? 'text' : 'password'" [(ngModel)]="pass1" name="pass1" required
            class="MuiInput-root bg-slate-50 dark:bg-gray-900 border border-slate-300 dark:border-gray-600 text-slate-900 dark:text-gray-100 text-sm rounded-xl focus:ring-2 focus:ring-gold-500 dark:focus:ring-green-500 focus:border-transparent block w-full px-4 py-3 pr-12 placeholder-slate-400 dark:placeholder-gray-500 transition-all" />
          <button type="button" (click)="showPass1 = !showPass1"
            class="absolute right-3 top-[38px] text-slate-400 dark:text-gray-400 hover:text-slate-600 dark:hover:text-gray-300">
            <ion-icon [name]="showPass1 ? 'eye-off-outline' : 'eye-outline'" class="text-xl"></ion-icon>
          </button>
        </div>

        <div class="relative animate-fade-in-up" style="animation-delay: 800ms">
          <label class="block mb-2 text-sm font-medium text-slate-700 dark:text-gray-300">Konfirmasi Password</label>
          <input [type]="showPass2 ? 'text' : 'password'" [(ngModel)]="pass2" name="pass2" required
            class="MuiInput-root bg-slate-50 dark:bg-gray-900 border border-slate-300 dark:border-gray-600 text-slate-900 dark:text-gray-100 text-sm rounded-xl focus:ring-2 focus:ring-gold-500 dark:focus:ring-green-500 focus:border-transparent block w-full px-4 py-3 pr-12 placeholder-slate-400 dark:placeholder-gray-500 transition-all" />
          <button type="button" (click)="showPass2 = !showPass2"
            class="absolute right-3 top-[38px] text-slate-400 dark:text-gray-400 hover:text-slate-600 dark:hover:text-gray-300">
            <ion-icon [name]="showPass2 ? 'eye-off-outline' : 'eye-outline'" class="text-xl"></ion-icon>
          </button>
        </div>

        <div class="animate-fade-in-up" style="animation-delay: 900ms">
          <button type="submit" [disabled]="loading"
            class="MuiButton-root w-full text-white bg-gold-500 hover:bg-gold-600 focus:ring-4 focus:ring-gold-300 dark:bg-green-700 dark:hover:bg-green-800 dark:focus:ring-green-800 font-bold rounded-xl text-base px-5 py-3.5 text-center transition-all disabled:opacity-60 active:scale-[0.97] hover:shadow-lg">
            Daftar
          </button>
        </div>

        <div class="animate-fade-in-up" style="animation-delay: 1000ms">
          <button type="button" (click)="clr()"
            class="w-full text-slate-600 dark:text-gray-300 bg-slate-100 dark:bg-gray-700 hover:bg-slate-200 dark:hover:bg-gray-600 focus:ring-4 focus:ring-slate-200 dark:focus:ring-gray-600 font-semibold rounded-xl text-base px-5 py-3.5 text-center transition-all active:scale-[0.97]">
            Batal
          </button>
        </div>
      </form>
    </div>
  </div>
</ion-content>
